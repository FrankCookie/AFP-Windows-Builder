name: Build Windows EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: Build executable with PyInstaller
      run: |
        pyinstaller --onefile ^
          --name AFP智能分析报告系统 ^
          --hidden-import flask ^
          --hidden-import werkzeug ^
          --hidden-import flask_cors ^
          --hidden-import numpy ^
          --hidden-import openpyxl ^
          --hidden-import pandas ^
          --collect-all flask ^
          afp_mvp_v2.py
      shell: cmd
    
    - name: Create distribution folder
      run: |
        mkdir dist\AFP完整版
        copy dist\AFP智能分析报告系统.exe dist\AFP完整版\
        mkdir dist\AFP完整版\uploads
        echo. > dist\AFP完整版\uploads\README.txt
        cd dist
        7z a AFP智能分析报告系统_Windows.zip AFP完整版\
      shell: cmd
    
    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ github.run_number }}
        release_name: AFP智能分析系统 v${{ github.run_number }}
        body: |
          AFP智能分析报告系统 Windows版本
          
          ## 下载与安装
          1. 下载 AFP智能分析报告系统_Windows.zip
          2. 解压到任意文件夹
          3. 双击 AFP智能分析报告系统.exe 即可运行
          
          ## 系统要求
          - Windows 10/11
          - 无需安装Python或其他依赖
        draft: false
        prerelease: false
    
    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: dist/AFP智能分析报告系统_Windows.zip
        asset_name: AFP智能分析报告系统_Windows.zip
        asset_content_type: application/zip
